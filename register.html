<div id="auth-container">
    <form id="register-form" class="space-y-6">
        <div class="space-y-4">
            <div class="group">
                <label class="sr-only" for="name">Full Name</label>

            <div class="group">
                <label class="sr-only" for="email">Email address</label>
                <input required class="w-full px-4 py-4 rounded-lg bg-surface border border-outline-variant focus-ring-uber transition-all text-on-surface font-medium placeholder:text-outline/60" id="email" name="email" placeholder="Email address" type="email"/>
            </div>
            <div class="group">
                <label class="sr-only" for="password">Password</label>
                <input required class="w-full px-4 py-4 rounded-lg bg-surface border border-outline-variant focus-ring-uber transition-all text-on-surface font-medium placeholder:text-outline/60" id="password" name="password" placeholder="Create Password" type="password"/>

        <!-- Status Message -->

<script>
    // Initialize Supabase
    const SUPABASE_URL = 'https://hyncyecefokfoarusyzl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5bmN5ZWNlZm9rZm9hcnVzeXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzY1MTUsImV4cCI6MjA5MTA1MjUxNX0.UVmXJgCz1jJYlZXIxuy2n6kgh8-OEHTSIypCqQCFy7E';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const registerForm = document.getElementById('register-form');
    const statusMsg = document.getElementById('status-message');
    const btnText = document.getElementById('btn-text');
    const registerBtn = document.getElementById('register-btn');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;

        // Reset UI
        statusMsg.classList.add('hidden');
        statusMsg.classList.remove('text-error', 'text-green-600');
        btnText.innerText = 'Creating account...';
        registerBtn.disabled = true;

        try {
            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: name,
                    }
                }
            });

            if (error) throw error;

            console.log('Registration successful:', data);
            
            // Show success message
            statusMsg.innerText = 'Account created! Please check your email for a verification link.';
            statusMsg.classList.add('text-green-600');
            statusMsg.classList.remove('hidden');
            
            // Optionally clear the form
            registerForm.reset();
            btnText.innerText = 'Create Account';
            registerBtn.disabled = false;

        } catch (error) {
            console.error('Error registering:', error.message);
            statusMsg.innerText = error.message;
            statusMsg.classList.add('text-error');
            statusMsg.classList.remove('hidden');
            btnText.innerText = 'Create Account';
            registerBtn.disabled = false;
        }
    });
</script>
